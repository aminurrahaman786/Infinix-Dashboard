var _tries=0,_locked=false;
var _MAX=5;

// ── Login ─────────────────────────────────────────────────────────────────
var _busy=false;
async function _ln(){
  if(_busy||_locked)return;
  var _id=document.getElementById('_ui').value.trim();

        document.getElementById('_lkm').className='_lk v';
